<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alta de Servicio</title>
  <link rel="stylesheet" href="css/style.css">
  <meta content="" property="og:title">
  <meta content="" property="og:type">
  <meta content="" property="og:url">
  <meta content="" property="og:image">
  <meta content="" property="og:image:alt">

  <link href="favicon.ico" rel="icon" sizes="any">
  <link href="icon.png" rel="apple-touch-icon">

  <link href="site.webmanifest" rel="manifest">
  <meta content="#fafafa" name="theme-color">
</head>
<body>

  <h1>Registrar Nuevo Servicio</h1>

<main style="max-width: 600px; margin: 40px auto; padding: 20px;">
  <form id="formulario-alta" class="card" style="width: 100%;">

    <div id="panel-errores" style="display: none; background: #ffcccc; color: #990000; padding: 10px; border-radius: 5px; margin-bottom: 15px; width: 90%;"></div>

    <div style="width: 90%; margin-bottom: 15px; text-align: left;">
      <label>Nombre del Servicio:</label>
      <label for="input-nombre"></label><input type="text" id="input-nombre" style="width: 100%; padding: 8px;">
    </div>

    <div style="width: 90%; margin-bottom: 15px; text-align: left;">
      <label>Descripción:</label>
      <label for="input-desc"></label><textarea id="input-desc" rows="3" style="width: 100%; padding: 8px;"></textarea>
    </div>

    <div style="width: 90%; margin-bottom: 15px; text-align: left;">
      <label>Inversión (Precio MXN):</label>
      <label for="input-precio"></label><input type="number" id="input-precio" style="width: 100%; padding: 8px;">
    </div>

    <div style="width: 90%; margin-bottom: 25px; text-align: left;">
      <label>URL de la Fotografía:</label>
      <label for="input-foto"></label><input type="text" id="input-foto" placeholder="ej. img/nuevo.jpg" style="width: 100%; padding: 8px;">
    </div>

    <button type="submit" class="btn-services">Guardar Servicio</button>
    <a href="index.html" style="display: block; margin-top: 15px; color: #3f459a;">Cancelar y regresar</a>
  </form>
</main>

<script src="js/alta.js"></script>
</body>
</html>
